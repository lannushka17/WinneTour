name: Release — Build Installers

# Запускається при пуші тегу виду v1.0.0, v2.3.1 тощо
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installers:
    # Матриця: три паралельних завдання для трьох ОС
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Клонування репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлення JDK 25 (включає jpackage)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # 3. Встановлення WiX Toolset (лише для Windows)
      - name: Install WiX Toolset (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          choco install wixtoolset --yes

      # 4. Встановлення інструментів збірки RPM (лише для Linux)
      - name: Install RPM packaging tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      # 5. Збірка Fat JAR (javapackager пропускаємо — версія з тега в jpackage)
      - name: Build Fat JAR
        run: mvn clean package -DskipTests -Djavapackager.skip=true

      # 6. Підготовка директорії вхідних файлів для jpackage
      - name: Prepare jpackage input
        shell: bash
        run: |
          python3 packaging/create-icons.py
          mkdir -p jpackage-input
          cp target/WineryTours-fat.jar jpackage-input/
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install imagemagick --yes
            magick convert packaging/linux/winerytours.png \
              -define icon:auto-resize=256,128,64,48,32,16 \
              packaging/windows/winerytours.ico
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            set -e
            ICONSET=packaging/macos/winerytours.iconset
            mkdir -p "$ICONSET"
            sips -z 16 16 packaging/linux/winerytours.png --out "$ICONSET/icon_16x16.png"
            sips -z 32 32 packaging/linux/winerytours.png --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32 32 packaging/linux/winerytours.png --out "$ICONSET/icon_32x32.png"
            sips -z 64 64 packaging/linux/winerytours.png --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128 128 packaging/linux/winerytours.png --out "$ICONSET/icon_128x128.png"
            sips -z 256 256 packaging/linux/winerytours.png --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256 256 packaging/linux/winerytours.png --out "$ICONSET/icon_256x256.png"
            sips -z 512 512 packaging/linux/winerytours.png --out "$ICONSET/icon_256x256@2x.png"
            iconutil -c icns "$ICONSET" -o packaging/macos/winerytours.icns
          fi

      # 7. Визначення версії з тегу (v1.0.0 → 1.0.0)
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # 8. Генерація нативного інсталятора через jpackage
      - name: Package installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "WineryTours" `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --vendor "Kulik KN-33" `
            --input jpackage-input/ `
            --main-jar WineryTours-fat.jar `
            --main-class com.sab.winery.Launcher `
            --icon packaging/windows/winerytours.ico `
            --dest dist/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Package installer (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --type dmg \
            --name "WineryTours" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Kulik KN-33" \
            --input jpackage-input/ \
            --main-jar WineryTours-fat.jar \
            --main-class com.sab.winery.Launcher \
            --icon packaging/macos/winerytours.icns \
            --dest dist/ \
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Package installer (Linux DEB & RPM)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Створення DEB-пакета для Debian/Ubuntu
          jpackage \
            --type deb \
            --name "winerytours" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Kulik KN-33" \
            --input jpackage-input/ \
            --main-jar WineryTours-fat.jar \
            --main-class com.sab.winery.Launcher \
            --icon packaging/linux/winerytours.png \
            --dest dist/ \
            --linux-shortcut \
            --java-options "--enable-native-access=ALL-UNNAMED"

          # Створення RPM-пакета для RedHat/Fedora/CentOS
          jpackage \
            --type rpm \
            --name "winerytours" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --vendor "Kulik KN-33" \
            --input jpackage-input/ \
            --main-jar WineryTours-fat.jar \
            --main-class com.sab.winery.Launcher \
            --icon packaging/linux/winerytours.png \
            --dest dist/ \
            --linux-shortcut \
            --java-options "--enable-native-access=ALL-UNNAMED"

          # Копіювання Fat JAR у директорію dist, щоб він також потрапив у реліз
          cp target/WineryTours-fat.jar dist/

      # 9. Збереження артефактів для наступного завдання
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/
          retention-days: 1

  # Окреме завдання: публікація GitHub Release (лише для push тегу)
  publish-release:
    needs: build-installers
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WineryTours ${{ github.ref_name }}"
          body: |
            ## Що нового у ${{ github.ref_name }}

            Опис змін цього релізу.

            ## Завантаження

            | Операційна система / Платформа | Файл |
            |---|---|
            | Windows 10/11 | `*.msi` |
            | macOS 12+ | `*.dmg` |
            | Ubuntu/Debian | `*.deb` |
            | RedHat/Fedora | `*.rpm` |
            | Будь-яка (з встановленою JRE) | `WineryTours-fat.jar` |
          files: installers/**
          draft: false
          prerelease: false
